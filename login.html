<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GitHub Issues Tracker</title>
    <!--tailwind & daisyUi cdn file -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google font link -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        * {
            font-family: "Geist", sans-serif;
            font-optical-sizing: auto;
        }
    </style>

    <link rel="icon" href="./assets/github-brands-solid[2].png">


</head>



<body class="bg-[#F8FAFC] ">

    <nav class=" ">
        <div class="min-h-screen flex items-center justify-center" style="background-color: #f5f5f5;">
            <div class="card w-96 bg-white shadow-lg rounded-xl">
                <div class="card-body p-8">
                    <div class="flex flex-col items-center mb-6">
                        <img src="./assets/github-logo.png" alt="">
                        <h2 class="card-title text-2xl font-bold" style="color: #2d3748;">GitHub Issues Tracker</h2>
                        <p class="text-gray-500 mt-2">Sign in to manage your issues</p>
                    </div>

                    <form id="loginForm" class="">
                        <div>
                            <label class="label">
                                <span class="label-text font-semibold" style="color: #2d3748;">Username</span>
                            </label>
                            <input type="text" id="username" placeholder="Enter Username"
                                class="input input-bordered w-full bg-white border-gray-300" />
                            <p class="text-sm" style="color: #4A00FF;">Default: admin</p>
                        </div>

                        <div>
                            <label class="label">
                                <span class="label-text font-semibold" style="color: #2d3748;">Password</span>
                            </label>
                            <input type="password" id="password" placeholder="Enter Password"
                                class="input input-bordered w-full bg-white border-gray-300" />
                            <p class="text-sm" style="color:  #4A00FF;">Default: admin123</p>
                        </div>

                        <button type="submit" class="btn w-full text-white ring-0 border-none mt- "
                            style="background-color: #4A00FF;">Sign In</button>
                    </form>

                    <div class="divider my-4">OR</div>

                    <div class="p-4 rounded-lg" style="background-color: #f0f0f0;">
                        <p class="text-sm mb-2" style="color: #9ca3af;">Demo Credentials:</p>
                        <div class="text-sm" style="color: #2d3748;">
                            <p><span class="font-semibold">Username:</span> admin</p>
                            <p><span class="font-semibold">Password:</span> admin123</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="./js/login.js"></script>
    </nav>



</body>

</html>
