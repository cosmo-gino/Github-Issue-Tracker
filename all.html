<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - GitHub Issues Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.19/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background-color: #f5f5f5;
        }
    </style>

</head>

<body>

    <div class="min-h-screen bg-[#f5f5f5]">
        <!-- Header/Navbar -->
        <div class="w-full bg-white shadow-sm py-4 px-6">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <img src="./assets/github-logo.png" class="w-9 h-9" alt="">
                    <h1 class="text-2xl font-bold text-[#2d3748]" >GitHub Issues Tracker</h1>
                </div>
                <div class="flex items-center gap-4">
                    <div class="form-control relative">
                        <input type="text" id="searchInput" placeholder="Search issues..."
                            class="input input-bordered w-64 bg-white border-gray-300 pr-12" />
                        <button id="searchBtn"
                            class="absolute right-2 top-1/2 transform -translate-y-1/2 btn btn-sm text-white p-2 bg-[#4A00FF]">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.35-4.35"></path>
                            </svg>
                        </button>
                    </div>
                    <button id="newIssueBtn" class="btn text-white bg-[#4A00FF]">
                        <span class="text-xl">+</span> New Issue
                    </button>
                </div>
            </div>
        </div>

        <!-- Content Container  -->
        <div class="w-full flex justify-center py-6">
            <div class="w-[70%]">
                <!-- Filters -->
                <div class="bg-white rounded-lg p-6 flex gap-2 mb-6">
                    <button class="filter-btn btn btn-sm px-10 text-white" data-filter="all"
                        style="background-color: #4A00FF;">All</button>
                    <button class="filter-btn btn btn-sm px-10 btn-outline bg-white" data-filter="open"
                        style="color: #4a5568; border-color: #cbd5e0;">Open</button>
                    <button class="filter-btn btn btn-sm px-10 btn-outline bg-white" data-filter="closed"
                        style="color: #4a5568; border-color: #cbd5e0;">Closed</button>
                </div>

                <!-- Issues Summary -->
                <div class="bg-white rounded-lg p-6 mb-6 shadow-sm">
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-full flex items-center justify-center bg-[#ECE4FF]">
                                <img src="assets/Aperture.svg" alt="Logo" class="w-7 h-7 ">
                            </div>
                            <div>
                                <h2 class="text-2xl font-bold" id="issuesCount" style="color: #2d3748;">0 Issues</h2>
                                <p class="text-gray-500">Track and manage your project issues</p>
                            </div>
                        </div>
                        <div class="flex gap-4">
                            <div class="flex items-center gap-2">
                                <img src="assets/open.svg" alt="Open" class="w-4 h-4" />
                                <span class="text-sm" style="color: #4a5568;">Open</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <img src="assets/closed.svg" alt="Closed" class="w-4 h-4" />
                                <span class="text-sm" style="color: #4a5568;">Closed</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Issues Grid -->
                <div id="issuesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                    <!-- Issues will be loaded here -->
                </div>

                <!-- Loading Spinner -->
                <div id="loadingSpinner" class="hidden">
                    <div class="flex justify-center items-center py-12">
                        <span class="loading loading-spinner loading-lg text-purple-600"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Issue Detail Modal -->
    <dialog id="issueModal" class="modal">
        <div class="modal-box max-w-2xl bg-white">
            <h3 class="font-bold text-2xl mb-4" id="modalTitle" style="color: #2d3748;">Issue Title</h3>

            <div class="flex items-center gap-2 mb-4">
                <span id="modalStatus" class="px-3 py-1 rounded-full text-sm font-semibold"
                    style="background-color: #10b981; color: white;">Opened</span>
                <span style="color: #2d3748;">•</span>
                <span id="modalAuthor" style="color: #2d3748;">Opened by Username</span>
                <span style="color: #2d3748;">•</span>
                <span id="modalDate" style="color: #2d3748;">Date</span>
            </div>

            <!-- Tags will be added down there -->
            <div class="flex gap-2 mb-4" id="modalTags">

            </div>

            <div class="mb-4">
                <p class="text-gray-700" id="modalDescription">Description</p>
            </div>

            <div class="bg-gray-100 rounded-lg p-4 mb-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <p class="text-sm text-gray-500 mb-1">Assignee:</p>
                        <p class="font-bold text-black" id="modalAssignee">Not assigned</p>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500 mb-1">Priority:</p>
                        <span id="modalPriority" class="badge text-xs px-3 py-1 rounded-full font-semibold">HIGH</span>
                    </div>
                </div>
            </div>

            <div class="flex justify-end">
                <button class="btn text-white px-6" id="closeModalBtn" style="background-color: #4A00FF;">Close</button>
            </div>
        </div>
        <form method="dialog" class="modal-backdrop">
            <button>close</button>
        </form>
    </dialog>

    <script src="./js/script.js"></script>
</body>

</html>
