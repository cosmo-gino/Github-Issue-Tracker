<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github-Issue-Tracker</title>
    <!--tailwind & daisyUi cdn file -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google font link -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Geist", sans-serif;
            font-optical-sizing: auto;
        }
    </style>
    <link rel="icon" href="./assets/github-brands-solid[2].png">

</head>


<body class="">

    <div class="min-h-screen bg-[#f5f5f5]">
        <!-- Header/Navbar -->
        <div class="w-full bg-white shadow-sm py-4 px-6">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <img src="./assets/github-logo.png" class="w-9 h-9" alt="">
                    <h1 class="text-2xl font-bold" style="color: #2d3748;">GitHub Issues Tracker</h1>
                </div>
                <div class="flex items-center gap-4">
                    <div class="form-control relative">
                        <input type="text" id="searchInput" placeholder="Search issues..."
                            class="input input-bordered w-64 bg-white border-gray-300 pr-12" />
                        <button id="searchBtn"
                            class="absolute right-2 top-1/2 transform -translate-y-1/2 btn btn-sm text-white p-2"
                            style="background-color: #4A00FF;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.35-4.35"></path>
                            </svg>
                        </button>
                    </div>
                    <button id="newIssueBtn" class="btn text-white" style="background-color: #4A00FF;">
                        <span class="text-xl">+</span> New Issue
                    </button>
                </div>
            </div>
        </div>
        <!-- Content Container -->
        <div class="w-full flex justify-center py-6">
            <div class="w-[70%]">
                <!-- Filters -->
                <div class="bg-white rounded-lg p-6 flex gap-2 mb-6">
                    <button class="filter-btn btn btn-sm px-10 text-white" data-filter="all"
                        style="background-color: #4A00FF;">All</button>
                    <button class="filter-btn btn btn-sm px-10 btn-outline bg-white" data-filter="open"
                        style="color: #4a5568; border-color: #cbd5e0;">Open</button>
                    <button class="filter-btn btn btn-sm px-10 btn-outline bg-white" data-filter="closed"
                        style="color: #4a5568; border-color: #cbd5e0;">Closed</button>
                </div>
                <!-- Issues Summary -->
                <div class="bg-white rounded-lg p-6 mb-6 shadow-sm">
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-full flex items-center justify-center"
                                style="background-color: #ECE4FF;">
                                <img src="assets/Aperture.svg" alt="Logo" class="w-7 h-7 ">
                            </div>
                            <div>
                                <h2 class="text-2xl font-bold" id="issuesCount" style="color: #2d3748;">0 Issues</h2>
                                <p class="text-gray-500">Track and manage your project issues</p>
                            </div>
                        </div>
                        <div class="flex gap-4">
                            <div class="flex items-center gap-2">
                                <img src="assets/open.svg" alt="Open" class="w-4 h-4" />
                                <span class="text-sm" style="color: #4a5568;">Open</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <img src="assets/closed.svg" alt="Closed" class="w-4 h-4" />
                                <span class="text-sm" style="color: #4a5568;">Closed</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Issues Grid -->
                <div id="issuesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">

                </div>

                <!-- Loading Spinner -->
                <div id="loadingSpinner" class="hidden">
                    <div class="flex justify-center items-center py-12">
                        <span class="loading loading-spinner loading-lg text-purple-600"></span>
                    </div>
                </div>

            </div>
        </div>


    </div>


    <script src="./js/script.js"></script>
</body>

</html>
