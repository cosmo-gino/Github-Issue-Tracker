<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - GitHub Issues Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.19/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        body {
            background-color: #f5f5f5;
        }
    </style>

</head>


<body>

    <div class="min-h-screen flex items-center justify-center bg-[#f5f5f5]">
        <div class="card w-96 bg-white shadow-lg rounded-xl">
            <div class="card-body p-8">
                <div class="flex flex-col items-center mb-6">
                    <img src="./assets/github-logo.png" alt="">
                    <h2 class="card-title text-2xl font-bold" style="color: #2d3748;">GitHub Issues Tracker</h2>
                    <p class="text-gray-500 mt-2">Sign in to manage your issues</p>
                </div>

                <form id="loginForm" class="">
                    <div>
                        <label class="label">
                            <span class="label-text font-semibold text-[#2d3748]">Username</span>
                        </label>
                        <input type="text" id="username" placeholder="Enter Username"
                            class="input input-bordered w-full bg-white border-gray-300" />
                        <p class="text-sm text-[#4A00FF]">Default: admin</p>
                    </div>

                    <div>
                        <label class="label">
                            <span class="label-text font-semibold text-[#2d3748]">Password</span>
                        </label>
                        <input type="password" id="password" placeholder="Enter Password"
                            class="input input-bordered w-full bg-white border-gray-300" />
                        <p class="text-sm text-[#4A00FF]">Default: admin123</p>
                    </div>

                    <button type="submit" class="btn w-full text-white ring-0 border-none mt-6 bg-[#4A00FF] ">Sign
                        In</button>
                </form>

                <div class="divider my-4">OR</div>

                <div class="p-4 rounded-lg bg-[#f0f0f0]">
                    <p class="text-sm mb-2 text-[#9ca3af]">Demo Credentials:</p>
                    <div class="text-sm text-[#2d3748]">
                        <p><span class="font-semibold">Username:</span> admin</p>
                        <p><span class="font-semibold">Password:</span> admin123</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="./js/login.js"></script>
</body>

</html>
